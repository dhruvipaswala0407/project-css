<!DOCTYPE HTML>
<html>
    <head>
        <title>
            homepage v1-ecommrce html
         </title>
         <link href="./css/style.css" rel="stylesheet"/>
         <link href="./images/icon.png" rel="icon"/>
         <link  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
        <div>
            <div class="topbar">
                <div class="container">
                    <div class="left">
                        <p>
                            Super Value Deals - Save more with coupons
                        </p>
                    </div>
                    <div class="right">
                        <i class="ri-flag-line"></i>
                        <span class="down">
                            English <i class="ri-arrow-down-s-line"></i>
                        </span>
                    </div>
                    <div class="clear">
                    </div>
                </div>
            </div>
        </div>
        <div class="main-head">
            <div class="logo-bar">
                <div class="container">
                    <div class="logo float-left">
                        <img src="https://freshcart.codescandy.com/assets/images/logo/freshcart-logo.svg" alt="freshcart"/>
                    </div>
                    <div class="search float-left">
                        <input type="text" placeholder="search for prodect"/>
                        <button><i class="ri-search-line"></i></button>
                    </div>
                    <div class="location float-left">
                        <button>
                            <i class="ri-map-pin-line"></i>location 
                        </button>
                    </div>
                    <div class="icon float-right">
                        <span><i class="ri-heart-3-line"></i></span>
                        <span><i class="ri-user-3-line"></i></span>
                        <span><i class="ri-shopping-bag-3-line"></i></span>
                    </div>
                </div>
            </div>
            <br/>
            <br/>
            <div class="navbar">
                <div class="container">
                    <div class="all-dep">
                        <button>
                            <i class="ri-microsoft-line"></i> All department
                        </button>
                    </div>
                    <div class="list">
                        
                    </div>
                </div>
            </div>
        </div>
        </header>
    </body>
</html>
